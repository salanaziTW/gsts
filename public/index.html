<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>اختبار Netlify Blobs</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #111827;
      --muted: #6b7280;
      --border: #e5e7eb;
      --primary: #2563eb;
      --danger: #dc2626;
      --success: #059669;
      --warning: #d97706;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #f8fafc, #e0f2fe);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .app {
      width: min(860px, 100%);
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      box-shadow: 0 24px 80px rgba(15, 23, 42, 0.12);
      overflow: hidden;
    }

    header {
      padding: 28px;
      background: #0f172a;
      color: white;
    }

    header h1 {
      margin: 0 0 10px;
      font-size: 30px;
    }

    header p {
      margin: 0;
      color: #cbd5e1;
      line-height: 1.8;
    }

    main {
      padding: 28px;
      display: grid;
      gap: 20px;
    }

    .panel {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 18px;
      background: #ffffff;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 10px;
    }

    textarea {
      width: 100%;
      min-height: 110px;
      resize: vertical;
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      font: inherit;
      line-height: 1.7;
      outline: none;
    }

    textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.1);
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 14px;
    }

    button {
      border: 0;
      border-radius: 12px;
      padding: 11px 16px;
      font: inherit;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover {
      transform: translateY(-1px);
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
    }

    .primary {
      background: var(--primary);
      color: white;
    }

    .secondary {
      background: #eef2ff;
      color: #3730a3;
    }

    .danger {
      background: #fee2e2;
      color: var(--danger);
    }

    .status {
      min-height: 28px;
      color: var(--muted);
      line-height: 1.8;
    }

    .status.success {
      color: var(--success);
      font-weight: 700;
    }

    .status.error {
      color: var(--danger);
      font-weight: 700;
    }

    pre {
      margin: 0;
      white-space: pre-wrap;
      word-break: break-word;
      direction: ltr;
      text-align: left;
      background: #0b1220;
      color: #e5e7eb;
      border-radius: 16px;
      padding: 18px;
      line-height: 1.7;
      overflow: auto;
      min-height: 180px;
    }

    .hint {
      color: var(--muted);
      line-height: 1.9;
      margin: 0;
    }

    code {
      direction: ltr;
      unicode-bidi: embed;
      background: #f3f4f6;
      border: 1px solid var(--border);
      padding: 2px 6px;
      border-radius: 7px;
    }

    @media (max-width: 640px) {
      body {
        padding: 12px;
      }

      header, main {
        padding: 20px;
      }

      header h1 {
        font-size: 24px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>اختبار Netlify Blobs</h1>
      <p>مشروع صغير جدًا للتأكد من أن الحفظ والقراءة والحذف تعمل داخل Netlify Blobs قبل استخدامه في الداشبورد.</p>
    </header>

    <main>
      <section class="panel">
        <label for="message">النص المراد حفظه</label>
        <textarea id="message" placeholder="اكتب أي نص ثم اضغط حفظ في Blobs">تجربة حفظ بيانات في Netlify Blobs</textarea>
        <div class="actions">
          <button class="primary" id="saveBtn">حفظ في Blobs</button>
          <button class="secondary" id="readBtn">قراءة من Blobs</button>
          <button class="danger" id="deleteBtn">حذف من Blobs</button>
        </div>
      </section>

      <section class="panel">
        <p class="status" id="status">جاهز للاختبار.</p>
        <pre id="output">لم يتم تنفيذ أي طلب بعد.</pre>
      </section>

      <section class="panel">
        <p class="hint">
          مسار الاختبار هو <code>/api/blob-test</code> ويتم تحويله تلقائيًا إلى <code>/.netlify/functions/blob-test</code> من خلال ملف <code>netlify.toml</code>.
        </p>
      </section>
    </main>
  </div>

  <script>
    const apiUrl = "/api/blob-test";
    const messageInput = document.getElementById("message");
    const output = document.getElementById("output");
    const statusEl = document.getElementById("status");
    const buttons = Array.from(document.querySelectorAll("button"));

    function setLoading(isLoading) {
      buttons.forEach((button) => {
        button.disabled = isLoading;
      });
    }

    function setStatus(message, type = "") {
      statusEl.textContent = message;
      statusEl.className = type ? `status ${type}` : "status";
    }

    function showJson(data) {
      output.textContent = JSON.stringify(data, null, 2);
    }

    async function requestApi(method, body) {
      setLoading(true);
      setStatus("جاري تنفيذ الطلب...");

      try {
        const response = await fetch(apiUrl, {
          method,
          headers: body ? { "content-type": "application/json" } : undefined,
          body: body ? JSON.stringify(body) : undefined
        });

        const data = await response.json();
        showJson(data);

        if (!response.ok || !data.ok) {
          setStatus(data.error || "حدث خطأ أثناء الاختبار.", "error");
          return;
        }

        setStatus(data.note || "تم تنفيذ العملية بنجاح.", "success");
      } catch (error) {
        showJson({ ok: false, error: error.message });
        setStatus("تعذر الاتصال بالـ Function. تأكد أن الموقع منشور على Netlify.", "error");
      } finally {
        setLoading(false);
      }
    }

    document.getElementById("saveBtn").addEventListener("click", () => {
      requestApi("POST", { message: messageInput.value });
    });

    document.getElementById("readBtn").addEventListener("click", () => {
      requestApi("GET");
    });

    document.getElementById("deleteBtn").addEventListener("click", () => {
      requestApi("DELETE");
    });
  </script>
</body>
</html>
